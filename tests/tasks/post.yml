# post test file
---
- name: test redis installation  # noqa command-instead-of-module
  ansible.builtin.shell: >
    echo "PING"
    | redis-cli -p 6379
    | grep -q 'PONG'
    && (echo 'Availability test: pass' && exit 0)
    || (echo 'Availability test: fail' && exit 1)
  changed_when: false
  tags:
    - skip_ansible_lint

- name: test redis installation  # noqa command-instead-of-module
  ansible.builtin.shell: >
    echo "PING"
    | redis-cli -p 6380
    | grep -q 'PONG'
    && (echo 'Availability test: pass' && exit 0)
    || (echo 'Availability test: fail' && exit 1)
  changed_when: false
  tags:
    - skip_ansible_lint
